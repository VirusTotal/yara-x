name: Publish NPM package

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    strategy:
      matrix:
        package:
          - dir: js-wasm
            sync_version: false
          - dir: ls-wasm
            sync_version: true

    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Install wasm-opt
        run: cargo install --locked wasm-opt

      - name: Install wasm-bindgen
        run: cargo install --locked wasm-bindgen-cli

      - name: Sync package version
        if: matrix.package.sync_version
        run: python3 .github/scripts/sync_version.py

      - name: Build and publish package
        run: cd ${{ matrix.package.dir }} && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}