# Deploy site to GitHub Pages
name: GitHub Pages

on:
  # Runs when site/** changes or when this file is modified.
  push:
    tags-ignore:
    - '**'
    paths:
    - 'site/**'
    - 'playground/**'
    - '.github/workflows/site.yaml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'site'

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

    - name: Install dependencies
      run: |
        cd site
        [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

    - name: Install playground dependencies
      run: |
        cd playground
        npm install

    - name: Build production website
      env:
        # For maximum backward compatibility with Hugo modules
        HUGO_ENVIRONMENT: production
        HUGO_ENV: production
      run: |
        cd site
        npm run build \
          -- \
          --gc \
          --minify \
          --environment production

    - name: Build playground
      run: |
        cd playground
        npm run build

    - name: Merge playground into Pages artifact
      run: |
        rm -rf site/public/playground
        mkdir -p site/public/playground
        cp -R playground/dist/. site/public/playground/

    - name: Upload artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: ./site/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0